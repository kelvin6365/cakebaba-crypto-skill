name: Release skill

# Build the .skill package and attach it to a GitHub Release on every tag push.
#   git tag v2.5 && git push origin v2.5
# Anyone can then download cakebaba-crypto-skill.skill from the Releases page
# and upload it to Claude.ai → Settings → Capabilities → Skills.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .skill package
        run: ./skills.sh build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cakebaba-crypto-skill
          path: dist/cakebaba-crypto-skill.skill

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cakebaba-crypto-skill.skill
          generate_release_notes: true
